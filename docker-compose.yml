services:
  postgres:
    image: postgres:16-alpine
    container_name: rms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: rms-user-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rms_db?schema=public
      JWT_SECRET: change-me-in-production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy --schema=../prisma/schema.prisma ; npm run dev"
    depends_on:
      - postgres

volumes:
  postgres_data:
